apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nulm.fullname" . }}-config
  labels:
    app: nulm
    app.kubernetes.io/name: {{ include "nulm.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: core
data:
  CLAUDE_BRIDGE_TRACING: {{ .Values.config.tracing | quote }}
  CLAUDE_BRIDGE_TOOL_PROFILE: {{ .Values.config.toolProfile | quote }}
  CLAUDE_BRIDGE_CONTROL_PLANE_DIR: {{ .Values.config.controlPlaneDir | quote }}