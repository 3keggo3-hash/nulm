apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nulm.fullname" . }}-secret
  labels:
    app: nulm
    app.kubernetes.io/name: {{ include "nulm.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: core
type: Opaque
data:
  # NOTE: In production, use ESO, Sealed Secrets, or external secret management
  # Values below are base64-encoded placeholders - replace before deployment
  otlp-endpoint: {{ .Values.secret.otlpEndpoint | default "<BASE64_PLACEHOLDER_REPLACE_ME>" | b64enc | quote }}
  ai-evaluator-api-key: {{ .Values.secret.aiEvaluatorApiKey | default "<BASE64_PLACEHOLDER_REPLACE_ME>" | b64enc | quote }}