apiVersion: apps/v1
kind: Deployment
metadata:
  name: nulm
  labels:
    app: nulm
    app.kubernetes.io/name: nulm
    app.kubernetes.io/component: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nulm
  template:
    metadata:
      labels:
        app: nulm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: nulm
          image: nulm/nulm:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
              name: dashboard
            - containerPort: 8766
              name: health
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8766
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: nulm-config
            - secretRef:
                name: nulm-secret
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}