apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nulm-egress
  labels:
    app: nulm
    app.kubernetes.io/name: nulm
    app.kubernetes.io/component: core
spec:
  podSelector:
    matchLabels:
      app: nulm
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 4317
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53